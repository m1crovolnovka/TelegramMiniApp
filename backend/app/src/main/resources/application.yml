spring:
  application:
    name: casino-backend
  profiles:
    default: prod

# CORS: только origins фронтенда (без /api/...). Маска покрывает preview-деплои Vercel.
# Env: CASINO_CORS_ALLOWED_ORIGIN_PATTERNS=..., CASINO_CORS_ALLOWED_ORIGINS=...
casino:
  cors:
    allowed-origin-patterns:
      - https://telegram-mini-app*.vercel.app
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5174
  admin:
    allowed-usernames:
      - admin
      - microvolnovka1
      - "microvolnovka1"
      - "@microvolnovka1"
      - ${CASINO_ADMIN_ALLOWED_USERNAMES}

---
spring:
  config.activate.on-profile: dev
  datasource:
    url: jdbc:h2:mem:casino;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

casino:
  jwt:
    secret: "change-me-use-long-random-secret-in-prod-min-256-bits-please-change-1234567890"
    access-token-validity-seconds: 3600
  telegram:
    bot-token: ""
  storage:
    local-dir: data/storage
  dev:
    seed: true
    starter-coins: 5000

---
spring:
  config.activate.on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update

casino:
  jwt:
    secret: ${CASINO_JWT_SECRET:change-me-use-long-random-secret-in-prod-min-256-bits-please-change-1234567890}
    access-token-validity-seconds: 3600
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
  storage:
    local-dir: ${CASINO_STORAGE_LOCAL_DIR:/app/data/storage}

management:
  endpoints:
    web:
      exposure:
        include: health,info
